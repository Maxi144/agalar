<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGALAR | Yönetim Paneli</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif;}
body{background-color:#0b0f19;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
.kavax-header{position:fixed;top:0;left:0;width:100%;height:80px;z-index:50;border-bottom:1px solid rgba(255,255,255,0.05);background-color:rgba(0,0,0,0.5);backdrop-filter:blur(12px);}
.kavax-container{max-width:1280px;margin:0 auto;padding:0 24px;height:100%;display:flex;align-items:center;justify-content:space-between;}
.logo-alani{font-size:24px;font-weight:bold;letter-spacing:0.05em;color:#ffffff;}
.menu-linkleri{display:flex;align-items:center;gap:32px;}
.menu-linkleri a{font-size:14px;font-weight:500;color:#9ca3af;text-decoration:none;}
.admin-etiket{background-color:#9333ea;color:#ffffff;padding:6px 14px;border-radius:6px;font-weight:700;box-shadow:0 0 15px rgba(147, 51, 234, 0.4);}
.giris-butonu{display:inline-flex;align-items:center;justify-content:center;height:40px;padding:0 24px;border-radius:6px;background-color:#ef4444;color:#ffffff;font-size:14px;font-weight:500;text-decoration:none;cursor:pointer;}
.panel-grid{margin-top:100px;padding:24px;max-width:1280px;width:100%;margin-left:auto;margin-right:auto;display:grid;grid-template-columns:1fr 2fr;gap:24px;}
.kart{background-color:#111827;border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:24px;margin-bottom:24px;}
.kart-baslik{color:#ffffff;font-size:18px;font-weight:700;margin-bottom:20px;border-bottom:1px solid rgba(255,255,255,0.05);padding-bottom:10px;}
.girdi-kutusu{width:100%;height:44px;background-color:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:0 16px;color:#ffffff;font-size:14px;margin-bottom:12px;outline:none;}
.panel-buton{width:100%;height:44px;background-color:#9333ea;color:#ffffff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;}
.liste-tablosu{width:100%;border-collapse:collapse;}
.liste-tablosu th{color:#ffffff;text-align:left;padding:12px;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.1);}
.liste-tablosu td{padding:12px;color:#9ca3af;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.05);}
.rutbe-secim{background-color:#0b0f19;color:#ffffff;border:1px solid rgba(255,255,255,0.1);padding:6px 10px;border-radius:4px;outline:none;font-size:13px;}
.sil-butonu{background-color:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.2);padding:6px 12px;border-radius:6px;cursor:pointer;font-weight:600;font-size:12px;}
.sil-butonu:hover{background-color:#ef4444;color:#ffffff;}
</style>
</head>
<body>
<header class="kavax-header">
<div class="kavax-container">
<div class="logo-alani">AGALAR</div>
<nav class="menu-linkleri"><a href="index.html">Ana Sayfa</a><a href="sunucular.html">Sunucular</a><a href="chat.html">Chat</a><span class="admin-etiket">Yönetim Paneli</span></nav>
<div class="giris-butonu" onclick="cikisYap()">Çıkış Yap</div>
</div>
</header>
<div class="panel-grid">
<div>
<div class="kart">
<h2 class="kart-baslik">Yeni Üye Ekle</h2>
<input type="text" id="yeni-kadi" class="girdi-kutusu" placeholder="Kullanıcı Adı">
<input type="password" id="yeni-sifre" class="girdi-kutusu" placeholder="Şifre">
<button class="panel-buton" onclick="uyeKaydet()">Bulut Dosyasına Yaz</button>
</div>
</div>
<div>
<div class="kart">
<h2 class="kart-baslik">Etkin Olan Kullanıcılar (Ortak JSON Bulutu)</h2>
<table class="liste-tablosu">
<thead><tr><th>Kullanıcı Adı</th><th>Mevcut Şifre</th><th>Kullanıcı Rütbesi</th><th>İşlem</th></tr></thead>
<tbody id="kullanici-listesi"></tbody>
</table>
</div>
</div>
</div>
<script>
// SİHİRLİ DÜZELTME: API linklerini hiç bölmeden, tam ve hazır olarak koda mühürledim!
var OKUMA_URL = "https://jsonbin.io";
var YAZMA_URL = "https://jsonbin.io";
var MASTER_KEY = "$2a$10$Dia5SMZ4rX54iOdZhkP9Gu5aWoufltUipsX3yxHEw9DpvoVLbI5FK";
var mevcutVeri = {};

window.onload = function() { listeyiYenile(); }

function listeyiYenile() {
    var tbody = document.getElementById('kullanici-listesi'); tbody.innerHTML = "";
    fetch(OKUMA_URL, {
        headers: { "X-Master-Key": MASTER_KEY }
    }).then(res => res.json()).then(resData => {
        mevcutVeri = resData.record || {};
        Object.keys(mevcutVeri).forEach(kadi => {
            var h = mevcutVeri[kadi]; var tr = document.createElement('tr');
            tr.innerHTML = '<td>'+kadi+'</td><td>'+h.sifre+'</td><td><select class="rutbe-secim" onchange="rutbeDegistir(\''+kadi+'\', this.value)"><option value="uye"'+(h.rutbe==='uye'?' selected':'')+'>Üye</option><option value="sahip"'+(h.rutbe==='sahip'?' selected':'')+'>Sunucu Sahibi</option><option value="admin"'+(h.rutbe==='admin'?' selected':'')+'>Yönetici</option></select></td><td><button class="sil-butonu" onclick="uyeSil(\''+kadi+'\')">Hesabı Kaldır</button></td>';
            tbody.appendChild(tr);
        });
    }).catch(() => alert("Kutudan veriler okunurken hata oluştu!"));
}

function uyeKaydet(){
    var u = document.getElementById('yeni-kadi').value.trim().toLowerCase();
    var p = document.getElementById('yeni-sifre').value.trim();
    if(!u || !p) { alert('Alanları doldurun!'); return; }
    mevcutVeri[u] = { sifre: p, rutbe: "uye" };
    bulutuGuncelle();
}

function uyeSil(kadi) {
    if(confirm(kadi + ' silinsin mi?')) { delete mevcutVeri[kadi]; bulutuGuncelle(); }
}

function rutbeDegistir(kadi, yeniRutbe) {
    mevcutVeri[kadi].rutbe = yeniRutbe; bulutuGuncelle();
}

function bulutuGuncelle() {
    fetch(YAZMA_URL, {
        method: "PUT",
        headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
        body: JSON.stringify(mevcutVeri)
    }).then(() => { alert("Ortak JSON dosyasına işlendi!"); document.getElementById('yeni-kadi').value=''; document.getElementById('yeni-sifre').value=''; listeyiYenile(); });
}

function cikisYap() { localStorage.removeItem('aktif_oturum'); window.location.href = "index.html"; }
</script>
</body>
</html>
