<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGALAR | Yönetim Paneli</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif;}
body{background-color:#0b0f19;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
.kavax-header{position:fixed;top:0;left:0;width:100%;height:80px;z-index:50;border-bottom:1px solid rgba(255,255,255,0.05);background-color:rgba(0,0,0,0.5);backdrop-filter:blur(12px);}
.kavax-container{max-width:1280px;margin:0 auto;padding:0 24px;height:100%;display:flex;align-items:center;justify-content:space-between;}
.logo-alani{font-size:24px;font-weight:bold;letter-spacing:0.05em;color:#ffffff;}
.menu-linkleri{display:flex;align-items:center;gap:32px;}
.menu-linkleri a{font-size:14px;font-weight:500;color:#9ca3af;text-decoration:none;}
.admin-etiket{background-color:#9333ea;color:#ffffff;padding:6px 14px;border-radius:6px;font-weight:700;box-shadow:0 0 15px rgba(147, 51, 234, 0.4);}
.giris-butonu{display:inline-flex;align-items:center;justify-content:center;height:40px;padding:0 24px;border-radius:6px;background-color:#ef4444;color:#ffffff;font-size:14px;font-weight:500;text-decoration:none;}
.panel-grid{margin-top:100px;padding:24px;max-width:1280px;width:100%;margin-left:auto;margin-right:auto;}
.kart{background-color:#111827;border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:24px;text-align:center;}
.kart-baslik{color:#ffffff;font-size:20px;font-weight:700;margin-bottom:16px;}
.aciklama{color:#9ca3af;font-size:15px;line-height:1.6;margin-bottom:24px;}
.form-link-btn{display:inline-flex;align-items:center;justify-content:center;height:48px;padding:0 32px;border-radius:8px;background-color:#9333ea;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;box-shadow:0 0 15px rgba(147, 51, 234, 0.4);transition:background-color 0.2s;}
.form-link-btn:hover{background-color:#a855f7;}
</style>
</head>
<body>
<header class="kavax-header">
<div class="kavax-container">
<div class="logo-alani">AGALAR</div>
<nav class="menu-linkleri"><a href="index.html">Ana Sayfa</a><a href="sunucular.html">Sunucular</a><a href="chat.html">Chat</a><span class="admin-etiket">Yönetim Paneli</span></nav>
<div class="giris-butonu" onclick="cikisYap()">Çıkış Yap</div>
</div>
</header>
<div class="panel-grid">
<div class="kart">
<h2 class="kart-baslik">Agalar Başvuru Yönetim Merkezi</h2>
<p class="aciklama">Gelen üyelik ve sunucu taleplerini görmek, yeni form yanıtlarını incelemek için aşağıdaki butona basarak doğrudan Google Forms yönetim ekranına geçiş yapabilirsin.</p>
<a href="https://google.com" target="_blank" class="form-link-btn">Google Form Yanıtlarını Aç</a>
</div>
</div>
<script>
function cikisYap() { sessionStorage.removeItem('aktif_oturum'); window.location.href = "index.html"; }
</script>
</body>
</html>
